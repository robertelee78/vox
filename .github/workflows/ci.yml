name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  build-test:
    name: build · clippy · fmt · test
    # ADR-015 scopes clients to macOS + Linux; the core is checked on both.
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      # rust-toolchain.toml pins the channel + components (rustfmt, clippy).
      - name: Show toolchain
        run: rustc --version && cargo --version
      - name: Format check
        run: cargo fmt --all --check
      # The default gate is PURE-RUST (no --all-features): the optional
      # `equihash-solver` feature pulls a C++ tromp backend (ADR-005 PoW prover
      # perf path) that must never be required for the core build/CI (ADR-001
      # principle 10). It gets its own opt-in compile check below.
      - name: Clippy (default, pure-Rust)
        run: cargo clippy --all-targets -- -D warnings
      - name: Test (default, pure-Rust)
        run: cargo test --workspace
      - name: Docs
        run: RUSTDOCFLAGS="-D warnings" cargo doc --workspace --no-deps

  # Compile-checks the optional C++ Equihash solver feature so it cannot rot,
  # but it is a separate, non-default job — the core never depends on it.
  solver-feature-build:
    name: equihash-solver (C++ tromp) build check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build with equihash-solver
        run: cargo build -p vox-core --features equihash-solver
